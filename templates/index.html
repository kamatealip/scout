<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scout Search</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body class="home-page">
    <main class="home-shell">
      <div class="home-brand">
        <a class="scout-logo scout-logo-large" href="{{ url_for('home') }}" aria-label="Scout">
          <span class="scout-logo-letter scout-logo-letter-blue">S</span><span class="scout-logo-letter scout-logo-letter-red">c</span><span class="scout-logo-letter scout-logo-letter-yellow">o</span><span class="scout-logo-letter scout-logo-letter-blue">u</span><span class="scout-logo-letter scout-logo-letter-green">t</span>
        </a>
        <p class="home-subtitle">
          Search <strong>{{ document_count_label }}</strong> local doc{% if document_count != 1 %}s{% endif %}
          from one simple index.
        </p>
      </div>

      <form action="{{ url_for('search_results') }}" method="GET" class="home-search-form">
        <label class="visually-hidden" for="home-query">Search your docs</label>
        <input
          type="text"
          name="q"
          id="home-query"
          class="home-search-input"
          placeholder="Search Scout"
          autofocus
          autocomplete="off"
          aria-describedby="home-help"
        />
        <button type="submit" class="home-search-button">Scout Search</button>
      </form>

      <p id="home-help" class="home-help">
        Try: async loop, task orchestration, callbacks
      </p>

      {% if error %}
      <div class="message message-state home-message">
        <strong class="message-title">{{ error }}</strong>
        <span class="message-hint">Run an index first, then search again.</span>
      </div>
      {% endif %}
    </main>
  </body>
</html>
