<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentation Search</title>
    <style>
      :root {
        --background: #fafafa;
        --foreground: #09090b;
        --card: #ffffff;
        --muted: #f4f4f5;
        --muted-foreground: #71717a;
        --border: #e4e4e7;
        --input: #e4e4e7;
        --primary: #18181b;
        --primary-foreground: #fafafa;
        --ring: rgba(9, 9, 11, 0.1);
        --shadow: rgba(9, 9, 11, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: var(--foreground);
        background: var(--background);
      }
      .shell {
        width: min(880px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.9rem, 3vw, 2.6rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--card);
        box-shadow:
          0 1px 2px var(--shadow),
          0 10px 24px var(--shadow);
      }
      .search-card {
        margin-bottom: 16px;
        padding: 18px;
      }
      .search-form {
        display: grid;
        gap: 14px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .search-primary {
        min-width: 0;
      }
      .search-secondary {
        display: grid;
        grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
        gap: 12px;
        align-items: end;
      }
      .field-label {
        font-size: 0.76rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      input[type="text"],
      select {
        width: 100%;
        min-height: 44px;
        padding: 0 13px;
        border: 1px solid var(--input);
        border-radius: 10px;
        background: var(--card);
        color: var(--foreground);
        font: inherit;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease;
      }
      input[type="text"]::placeholder {
        color: var(--muted-foreground);
      }
      input[type="text"]:focus,
      select:focus {
        outline: none;
        border-color: #27272a;
        box-shadow: 0 0 0 4px var(--ring);
      }
      .actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        min-height: 44px;
        padding: 0 2px;
      }
      button {
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid var(--primary);
        border-radius: 10px;
        background: var(--primary);
        color: var(--primary-foreground);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      button:hover {
        background: #27272a;
      }
      .option {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted-foreground);
        font-size: 0.92rem;
      }
      .option input {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: #18181b;
      }
      .message {
        margin: 0 0 16px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--card);
        color: var(--muted-foreground);
      }
      .message strong {
        color: var(--foreground);
      }
      .message-loading {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .message-loading::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 2px solid var(--border);
        border-top-color: var(--foreground);
        border-radius: 999px;
        animation: spin 700ms linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .results {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }
      .result-card {
        padding: 16px;
      }
      .result-link {
        color: var(--foreground);
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
      }
      .result-link:hover {
        text-decoration: underline;
        text-underline-offset: 0.15em;
      }
      .result-meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--muted);
        color: var(--foreground);
        font-size: 0.78rem;
        font-weight: 600;
      }
      .snippet {
        margin-top: 12px;
        color: var(--muted-foreground);
        font-size: 0.94rem;
        line-height: 1.6;
      }
      mark {
        padding: 0 0.14em;
        border-radius: 0.18em;
        background: #e4e4e7;
        color: var(--foreground);
      }
      @media (max-width: 720px) {
        .search-secondary {
          grid-template-columns: 1fr;
        }
        .actions {
          align-items: stretch;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <h1>Documentation Search</h1>

      <div class="card search-card">
        <form method="POST" class="search-form">
          <label class="field search-primary" for="query">
            <span class="field-label">Search Terms</span>
            <input
              type="text"
              name="query"
              id="query"
              placeholder="Search your docs"
              value="{{ query }}"
            />
          </label>
          <div class="search-secondary">
            <label class="field" for="section">
              <span class="field-label">Section</span>
              <select name="section" id="section">
                {% for option in section_options %}
                <option
                  value="{{ option.value }}"
                  {% if option.value == selected_section %}
                  selected
                  {% endif %}
                >
                  {{ option.label }}
                </option>
                {% endfor %}
              </select>
            </label>
            <div class="actions">
              <label class="option" for="stemming">
                <input
                  type="checkbox"
                  id="stemming"
                  name="stemming"
                  value="1"
                  {% if use_stemming %}
                  checked
                  {% endif %}
                />
                Use stemming
              </label>
              <button type="submit">Search</button>
            </div>
          </div>
        </form>
      </div>

      <section id="results-region" aria-live="polite">
        {% include "_search_results.html" %}
      </section>
    </section>
    <script>
      (() => {
        const form = document.querySelector(".search-form");
        const resultsRegion = document.getElementById("results-region");
        const submitButton = form?.querySelector('button[type="submit"]');
        if (!form || !resultsRegion || !window.fetch) {
          return;
        }

        let activeController = null;
        const defaultButtonText = submitButton?.textContent ?? "Search";

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          activeController?.abort();
          const requestController = new AbortController();
          activeController = requestController;

          if (submitButton) {
            submitButton.disabled = true;
            submitButton.textContent = "Getting info...";
          }
          resultsRegion.innerHTML =
            '<p class="message message-loading">Getting info...</p>';

          try {
            const response = await fetch(form.action || window.location.pathname, {
              method: "POST",
              body: new FormData(form),
              headers: { "X-Requested-With": "XMLHttpRequest" },
              signal: requestController.signal,
            });

            if (!response.ok) {
              throw new Error("Search request failed");
            }

            if (activeController === requestController) {
              resultsRegion.innerHTML = await response.text();
            }
          } catch (error) {
            if (error.name === "AbortError") {
              return;
            }
            if (activeController === requestController) {
              resultsRegion.innerHTML =
                '<p class="message">Could not fetch documents right now. Please try again.</p>';
            }
          } finally {
            if (submitButton && activeController === requestController) {
              submitButton.disabled = false;
              submitButton.textContent = defaultButtonText;
            }
            if (activeController === requestController) {
              activeController = null;
            }
          }
        });
      })();
    </script>
  </body>
</html>
